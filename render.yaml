services:
  - type: web
    name: wallet-wc26
    runtime: node
    region: oregon
    plan: starter
    healthCheckPath: /health
    autoDeploy: false
    buildCommand: >-
      curl -fsSL https://bun.sh/install | bash &&
      export PATH="$HOME/.bun/bin:$PATH" &&
      bun install --frozen-lockfile &&
      bun src/gen-assets.ts
    startCommand: >-
      $HOME/.bun/bin/bun src/index.ts
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PASS_TYPE_ID
        value: pass.com.max-lohmann.worldcup
      - key: TEAM_ID
        value: B7369J9TM3
      - key: SUPABASE_URL
        value: https://qyxariftpssgatgqzydr.supabase.co
      - key: BZZOIRO_API_TOKEN
        sync: false
      - key: WALLET_AUTH_TOKEN
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SERVICE_URL
        sync: false
